services:
  app:
    build: .
    image: eat-scheduler:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/eat.db
    volumes:
      - eat-data:/data
    restart: unless-stopped

  # Décommenter pour utiliser Postgres au lieu de SQLite
