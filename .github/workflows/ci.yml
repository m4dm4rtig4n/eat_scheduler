name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: file:./data/eat.db

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: eat-scheduler:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-validate:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint helm/eat-scheduler -f helm/eat-scheduler/example/values.yaml

      - name: Helm template
        run: helm template eat helm/eat-scheduler -f helm/eat-scheduler/example/values.yaml --debug

      - name: Helm package (validation)
        run: |
          mkdir -p dist
          helm package helm/eat-scheduler --destination ./dist
          ls -la dist/

  commitlint:
    name: Validate commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install commitlint
        run: pnpm add -D -w @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
