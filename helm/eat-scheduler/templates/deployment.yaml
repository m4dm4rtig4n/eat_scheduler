apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eat-scheduler.fullname" . }}
  labels:
    {{- include "eat-scheduler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- if eq .Values.database.mode "sqlite" }}
    type: Recreate
    {{- else }}
    type: RollingUpdate
    {{- end }}
  selector:
    matchLabels:
      {{- include "eat-scheduler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eat-scheduler.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if eq .Values.database.mode "sqlite" }}
            - name: DATABASE_URL
              value: "file:/data/eat.db"
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.existingSecret | required "postgres.existingSecret requis en mode postgres" }}
                  key: {{ .Values.database.postgres.secretKey }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: APP_PASSWORD
              {{- if .Values.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKey }}
              {{- else }}
              value: {{ .Values.auth.password | required "auth.password ou auth.existingSecret requis quand auth.enabled=true" | quote }}
              {{- end }}
            - name: AUTH_MAX_FAILS
              value: {{ .Values.auth.maxFails | quote }}
            - name: AUTH_FAIL_WINDOW_MINUTES
              value: {{ .Values.auth.failWindowMinutes | quote }}
            - name: AUTH_BAN_DURATION_MINUTES
              value: {{ .Values.auth.banDurationMinutes | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if eq .Values.database.mode "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if eq .Values.database.mode "sqlite" }}
      volumes:
        - name: data
          {{- if .Values.database.sqlite.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "eat-scheduler.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
